<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- This makes the page scale properly on phones, tablets, and computers. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TypeRush</title>

  <!-- Link to CSS file -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- =========================
       Main menu screen
   ========================== -->
  <section id="menu-screen">
    <h1>TypeRush</h1>
    <p>A typing speed and accuracy game</p>

    <!-- Mode selector -->
    <h2>Choose Mode</h2>
    <!-- This creates a dropdown where the player chooses the game mode and the value is what JavaScript will read later. -->
    <select id="mode-select">
      <option value="words">Words</option>
      <option value="sentences">Sentences</option>
      <option value="code">Code</option>
    </select>

    <!-- Difficulty selector -->
    <h2>Choose Difficulty</h2>
    <select id="difficulty-select">
      <option value="easy">Easy</option>
      <option value="medium">Medium</option>
      <option value="hard">Hard</option>
    </select>

    <!-- Start button -->
    <button id="start-btn">Start Game</button>
  </section>

  <!-- =========================
       Game screen
  ========================== -->
  <section id="game-screen" class="hidden">
    <h1>TypeRush</h1>

    <!-- Game stats shown during the typing session.
    These values are updated by input.js while the player types. -->
    <div class="stats-panel">

    <!-- WPM = Words Per Minute.
    JavaScript updates this number in real time. -->
    <div class="stat-card">
      <span class="stat-label">WPM</span>
      <span id="wpm" class="stat-value">0</span>
    </div>

    <!-- Accuracy shows how many typed characters were correct.
    It should display as a percentage with one decimal place. -->
    <div class="stat-card">
      <span class="stat-label">Accuracy</span>
      <span id="accuracy" class="stat-value">100.0%</span>
    </div>

    <!-- Lives display.
    Person A's game logic updates this when the player makes mistakes. -->
    <div class="stat-card">
      <span class="stat-label">Lives</span>
      <span id="lives" class="stat-value">❤️❤️❤️</span>
    </div>

    <!-- Streak multiplier display.
    This increases when the player types correctly without mistakes. -->
    <div class="stat-card">
      <span class="stat-label">Streak</span>
      <span id="multiplier" class="stat-value">1x</span>
    </div>

  <!-- Timer display.
    This will be used later for timed game modes. -->
  <div class="stat-card">
    <span class="stat-label">Timer</span>
    <span class="stat-value"><span id="timer">60</span>s</span>
  </div>
</div>

    <!-- Text player will type -->
    <div id="target-text"></div>

    <!-- Debug/testing info -->
    <p>Current position: <span id="current-position">0</span></p>
    <p>Status: <span id="status">Waiting...</span></p>

    <!-- Input field -->
    <!-- The placeholder is just the grey text shown before the user types. -->
    <input id="typing-input" type="text" placeholder="Start typing here..." />

    <!-- Temporary button to simulate end of game -->
    <!-- This is a temporary button to test the results screen before the full timer/game logic is done. -->
    <button id="finish-btn">Finish Session</button>
  </section>

  <!-- =========================
     Results screen
    ========================== -->
    <section id="results-screen" class="hidden">
    <h1>Results</h1>

    <!-- Hidden by default.
    JavaScript will show this only if the player beats their personal best. -->
    <p id="new-best-badge" class="hidden">🎉 New Best!</p>

    <!-- Results cards.
    Each span has an id so script.js can update it after the game ends. -->
    <div class="results-panel">

        <!-- Final WPM from Person A's sessionResult -->
        <div class="result-card">
          <span class="result-label">Final WPM</span>
          <span id="final-wpm" class="result-value">0</span>
        </div>

        <!-- Final accuracy from Person A's sessionResult -->
        <div class="result-card">
          <span class="result-label">Accuracy</span>
          <span id="final-accuracy" class="result-value">100.0%</span>
        </div>

        <!-- Final score from Person A's score calculation -->
        <div class="result-card">
          <span class="result-label">Score</span>
          <span id="final-score" class="result-value">0</span>
        </div>

        <!-- Personal best from Person C's backend route GET /best -->
        <div class="result-card">
          <span class="result-label">Personal Best</span>
          <span id="personal-best" class="result-value">0</span>
        </div>

        <!-- Game mode played, such as words, sentences, or code -->
        <div class="result-card">
          <span class="result-label">Mode</span>
          <span id="final-mode" class="result-value">Words</span>
        </div>

    </div>

    <!-- Reloads the page so the player can start again cleanly -->
    <button id="play-again-btn">Play Again</button>

    <!-- Sends the player back to the main menu -->
    <button id="back-menu-btn">Back to Menu</button>
</section>

  <!-- Link to JavaScript -->
  <!-- This connects the HTML to the JavaScript files. It is placed at the bottom so the HTML loads first, then JavaScript can find all the elements. -->
  <!-- For screen switching -->
  <script src="script.js"></script>
  <!-- For typing logic -->
  <script src="input.js"></script>
</body>
</html>
